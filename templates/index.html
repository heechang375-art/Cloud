<!DOCTYPE html>
<html>
<head>
    <title>NHN Cloud Smart Deployer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5 bg-light">
    <div class="card shadow p-4 mx-auto" style="max-width: 800px;">
        <h3 class="text-center mb-4">☁️ NHN Cloud 인프라 자동화 도구</h3>
        
        <form action="/deploy" method="post" id="deployForm">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">리전 선택</label>
                    <select name="region" id="region" class="form-select">
                        <option value="KR1">한국(판교) - KR1</option>
                        <option value="KR2">한국(평촌) - KR2</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">API ID</label>
                    <input type="text" name="user_id" id="user_id" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="password" class="form-control" required>
                        <button type="button" class="btn btn-outline-secondary" onclick="loadTenants()">인증</button>
                    </div>
                </div>

                <hr>

                <div class="col-md-6">
                    <label class="form-label">프로젝트(테넌트)</label>
                    <select name="tenant_id" id="tenant_select" class="form-select" onchange="loadResources()" disabled></select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">필요 호스트 수</label>
                    <input type="number" name="host_count" class="form-control" value="20">
                </div>

                <div class="col-md-12">
                    <label class="form-label">OS 이미지</label>
                    <select name="image_id" id="image_select" class="form-select" disabled></select>
                </div>
                <div class="col-md-12">
                    <label class="form-label">인스턴스 사양</label>
                    <select name="flavor_id" id="flavor_select" class="form-select" disabled></select>
                </div>

                <div class="col-md-12">
                    <label class="form-label">서버 이름</label>
                    <input type="text" name="server_name" class="form-control" value="web-server-auto">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4 btn-lg">🚀 인프라 배포 시작</button>
        </form>
    </div>
    <script>
        async function loadTenants() {
    const data = {
        region: document.getElementById('region').value,
        user_id: document.getElementById('user_id').value,
        password: document.getElementById('password').value
    };

    const res = await fetch('/get_tenants', {
        method: 'POST', 
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });

    if (res.ok) {
        const result = await res.json();
        
        // 1. 프로젝트(테넌트) 반복문
        const tSel = document.getElementById('tenant_select');
        tSel.innerHTML = ""; // 초기화
        result.tenants.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = t.name;
            tSel.appendChild(opt);
        });
        tSel.disabled = false;

        // 2. OS 이미지 반복문
        const iSel = document.getElementById('image_select');
        iSel.innerHTML = '<option value="">-- 이미지 선택 --</option>';
        if (result.images && result.images.length > 0) {
            result.images.forEach(img => {
                const opt = document.createElement('option');
                opt.value = img.id;
                opt.textContent = img.name;
                iSel.appendChild(opt);
            });
            iSel.disabled = false;
        }

        // 3. 인스턴스 사양 반복문
        const fSel = document.getElementById('flavor_select');
        fSel.innerHTML = '<option value="">-- 사양 선택 --</option>';
        if (result.flavors && result.flavors.length > 0) {
            result.flavors.forEach(flv => {
                const opt = document.createElement('option');
                opt.value = flv.id;
                opt.textContent = `${flv.name} (vCPU: ${flv.vcpus}, RAM: ${flv.ram}MB)`;
                fSel.appendChild(opt);
            });
            fSel.disabled = false;
        }

        alert("✅ 모든 목록을 불러왔습니다!");
    } else {
        alert("❌ 실패! API 정보를 확인하세요.");
    }
}
    </script>
    
</body>
</html>
